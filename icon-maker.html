    <div class="set-data-items">

        <p> Выберите цвет иконки аватара  <input type="color" id="input-color-avatar"></p>
        <button id="set-color-avatar">Задать цвет аватара</button>
      </div>
      <div class="set-data-item">
        <p> Выберите цвет фона для аватара  <input type="color" id="input-background-avatar"></p>

      </div>
      <div class="get-data-item"><button id="download-button">Скачать</button></div></div>

  </div>
  <script> 
  const input_background_avatar= document.getElementById("input-background-avatar").value;
  const set_background_avatar = document.getElementById("set-background-avatar");
  const input_color_avatar= document.getElementById("input-color-avatar").value;
  const set_color_avatar = document.getElementById("set-color-avatar");
  const svg = document.getElementById("mySvg");
  const download_button = document.getElementById("download-button");
  const imageAvatar = document.getElementById("imageAvatar");
  const fillAvatar = document.getElementById("fillAvatar");
  set_background_avatar.addEventListener ("click", function () {
    fillAvatar.setAttribute("fill", input_background_avatar);
  });
  set_color_avatar.addEventListener ("click", function () {
    document.getElementById("avatar-icon").style.fill = input_color_avatar;
  });
  download_button.addEventListener("click", function () {
    const serialazer = new XMLSerializer();
    const svgData = serialazer.serializeToString(svg);
    const img = new Image();
    img.crossOrigin = "Anonymous";
    const canvas = document.createElement('canvas');
    canvas.width = svg.clientWidth;
    canvas.height = svg.clientHeight; 
    const svgBlob = new Blob ([svgData], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    const ctx = canvas.getContext('2d');
    img.src = url;
    img.onload = function () {
        ctx.drawImage(img,0,0);
        const PngURL = canvas.toDataURL('image/png');
        const downloadLink = document.createElement('a');
        downloadLink.href = PngURL;
        downloadLink.download = 'KozAvatar.png';
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    };
})

  </script>
